<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NusaGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[url('https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Bromo-Semeru-Batok-Widodaren.jpg/1200px-Bromo-Semeru-Batok-Widodaren.jpg')] bg-cover bg-center bg-no-repeat h-screen flex items-center justify-center">

    <div class="absolute inset-0 bg-black/40"></div>

    <div class="relative z-10 bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-2xl shadow-2xl w-[90%] max-w-md text-white">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold mb-2">Nusa<span class="text-blue-400">Go</span></h1>
            <p class="text-gray-200 text-sm">Masuk untuk melanjutkan petualanganmu</p>
        </div>

       <form onsubmit="prosesLogin(event)" class="space-y-5">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" placeholder="contoh@email.com" required class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" placeholder="••••••••" required class="w-full px-4 py-3 rounded-lg bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 transition duration-300 rounded-lg font-bold shadow-lg">Masuk Sekarang</button>
        </form>

        <p class="mt-6 text-center text-sm">
            Belum punya akun? <a href="register.html" class="text-blue-400 font-bold hover:underline">Daftar di sini</a>
        </p>
    </div>

    <script>
        function prosesLogin(event) {
            event.preventDefault(); // Mencegah reload paksa
            // Menyimpan nama ke memori browser
            localStorage.setItem("userName", "Sarah Amalia"); // Nama dummy untuk contoh login
            // Lempar kembali ke landing page
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
